ktor:
  deployment:
    port: 8080
  application:
    modules:
      - ai.plugins.SerializationKt.configureSerialization
      - ai.plugins.StatusPagesKt.configureStatusPages
      - ai.plugins.KoinKt.configureKoin
      - ai.infrastructure.MongoFactoryKt.connectToMongoDB
      - ai.plugins.RoutingKt.configureRouting

db:
  mongo:
    user: ${?DB_MONGO_USER}
    password: ${?DB_MONGO_PASSWORD}
    database:
      name: "nutricao_db"